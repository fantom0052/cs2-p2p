services:
  redpanda:
    image: redpandadata/redpanda:v24.3.6
    container_name: p2p-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr=internal://0.0.0.0:28082,external://0.0.0.0:8082
      - --advertise-pandaproxy-addr=internal://redpanda:28082,external://localhost:8082
    ports:
      - "9092:9092"
      - "8082:8082"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  redpanda-console:
    image: redpandadata/console:v2.8.4
    container_name: p2p-redpanda-console
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:29092
    ports:
      - "8080:8080"

volumes:
  redpanda-data:
